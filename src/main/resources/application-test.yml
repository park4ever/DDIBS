spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ddibs_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DDIBS_TEST_DB_USERNAME:${DDIBS_DB_USERNAME:root}}
    password: ${DDIBS_TEST_DB_PASSWORD:${DDIBS_DB_PASSWORD:}}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false